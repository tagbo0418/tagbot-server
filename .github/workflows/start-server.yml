name: Start NCP Server

on:
  workflow_dispatch:
  schedule:
    - cron: '30 22 * * 0-4'

jobs:
  start-server:
    runs-on: ubuntu-latest

    steps:
      - name: Check Korea holiday
        id: holiday
        run: |
          python -m pip install holidays
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from holidays import country_holidays
          import os

          today = datetime.now(ZoneInfo("Asia/Seoul")).date()
          kr_holidays = country_holidays("KR", years=[today.year])

          is_holiday = today in kr_holidays
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"is_holiday={'true' if is_holiday else 'false'}\n")
              if is_holiday:
                  f.write(f"holiday_name={kr_holidays.get(today)}\n")
          PY

      - name: Skip on holiday
        if: steps.holiday.outputs.is_holiday == 'true'
        run: |
          echo "한국 공휴일/대체공휴일이라 서버 시작을 건너뜁니다: ${{ steps.holiday.outputs.holiday_name }}"

      - name: Start server
        if: steps.holiday.outputs.is_holiday != 'true'
        run: |
          TIMESTAMP=$(($(date +%s%N)/1000000))
          METHOD="GET"
          URI="/vserver/v2/startServerInstances?serverInstanceNoList.1=${{ secrets.NCP_SERVER_INSTANCE_NO }}"
          MESSAGE="${METHOD} ${URI}\n${TIMESTAMP}\n${{ secrets.NCP_ACCESS_KEY }}"
          SIGNATURE=$(printf "%b" "${MESSAGE}" | openssl dgst -sha256 -hmac "${{ secrets.NCP_SECRET_KEY }}" -binary | openssl base64)

          curl -X GET "https://ncloud.apigw.ntruss.com${URI}" \
            -H "x-ncp-apigw-timestamp: ${TIMESTAMP}" \
            -H "x-ncp-iam-access-key: ${{ secrets.NCP_ACCESS_KEY }}" \
            -H "x-ncp-apigw-signature-v2: ${SIGNATURE}"
